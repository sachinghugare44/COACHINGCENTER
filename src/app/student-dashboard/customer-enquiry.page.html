<ion-header>
  <ion-toolbar color="primary" class="dashboard-header-toolbar">
    <div class="header-content">
      <ion-title class="dashboard-title desktop-only">Customer Enquiry</ion-title>
     
      <div class="user-info">
        <div class="user-details">
          <div class="user-name">Sachin Ghugare</div>
          <div class="login-time">Login: 09:15 AM</div>
        </div>
        <div class="profile-pic">
          <img src="assets/icon/profile-demo.jpg" alt="Profile" />
        </div>
        <ion-button size="small" color="light" class="logout-btn" (click)="logout()">
          <ion-icon name="log-out-outline"></ion-icon>
          <span class="logout-text">Logout</span>
        </ion-button>
      </div>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content class="dashboard-content">
  <div class="dashboard-layout">
    <!-- Hamburger Menu Overlay for Mobile -->
    <div class="menu-overlay" *ngIf="isMobile() && menuExpanded" (click)="menuExpanded = false"></div>
    <!-- Animated Hamburger Menu -->
    <div 
      class="hamburger-menu" 
      [class.expanded]="menuExpanded"
      [class.mobile-open]="menuExpanded && isMobile()"
      (mouseenter)="!isMobile() && (menuExpanded = true)"
      (mouseleave)="!isMobile() && (menuExpanded = false)"
      [style.display]="!isMobile() ? 'block' : (menuExpanded ? 'block' : 'none')">
      <div class="menu-toggle desktop-only">
        <ion-icon name="menu-outline"></ion-icon>
      </div>
      <ul class="menu-list">
        <!-- <li (click)="navigateToHome()">
          <ion-icon name="home-outline" ></ion-icon>
          <span *ngIf="menuExpanded">Home</span>
        </li> -->

        <li (click)="navigateToStudentDetails()">
          <ion-icon name="analytics-outline"></ion-icon>
          <span *ngIf="menuExpanded">Dashboard</span>
        </li>
        <li (click)="navigateToStudentDetails()">
          <ion-icon name="person-outline"></ion-icon>
          <span *ngIf="menuExpanded">Students Details</span>
        </li>
        <li (click)="navigateToAttendance()">
          <ion-icon name="calendar-outline"></ion-icon>
          <span *ngIf="menuExpanded">Attendance</span>
        </li>
        <li (click)="navigateToResults()">
          <ion-icon name="stats-chart-outline"></ion-icon>
          <span *ngIf="menuExpanded">Results</span>
        </li>

        <li (click)="navigateToCustomerEnquiries()">
          <ion-icon name="list-outline"></ion-icon>
          <span *ngIf="menuExpanded">Customer Enquiries List</span>
        </li>
      </ul>
    </div>

    <div class="main-content">
      <!--
        Show customer enquiry in card format:
        - Card shows name, mobile number, and enquiry text
        - Card is animated, not regular rectangle (e.g. skewed, shadow, or wavy border)
        - On hover, show more details (expand or highlight)
        - Four cards per row, responsive
      -->
      <div class="enquiry-cards">
        <div class="enquiry-card" *ngFor="let enquiry of enquiries">
          <div class="enquiry-card-inner">
            <div class="enquiry-header">
              <ion-icon name="chatbubble-ellipses-outline"></ion-icon>
              <span class="enquiry-name">{{enquiry.customer_name}}</span>
            </div>
            <div class="enquiry-mobile">{{enquiry.mobile_number}}</div>
            <div class="enquiry-text">{{enquiry.createdAt | date:'dd/MM/yyyy : HH:mm a'}}</div>

          </div>
        </div>
      </div>
    </div>
  </div>
</ion-content>
